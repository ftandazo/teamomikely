<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Kely 💗</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="overlay">
    <div class="card">
      <h1 class="titulo">Para Kely 💗</h1>
      <p class="subtitulo">Un rincóncito hecho con amor</p>

      <div class="contador-box">
        <h2>Tiempo juntos</h2>
        <p id="contador">Cargando contador...</p>
      </div>

      <div class="poema-box">
        <h2>Poema del día</h2>
        <p id="poema">Cargando poema...</p>
      </div>

      <div class="mensaje-box">
        <h2>Mensaje especial</h2>
        <p id="mensaje-especial">Hoy solo quería recordarte que me encantas demasiado.</p>
      </div>

      <div class="video-box">
        <h2>Video bonito</h2>
        <video controls width="100%">
          <source src="K.mp4" type="video/mp4" />
          Tu navegador no soporta video.
        </video>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
