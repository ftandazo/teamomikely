name: Poema Diario

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ejecutar script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node generar_poema.js

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add poema.json
          git commit -m "Nuevo poema diario" || echo "Sin cambios"
          git push
