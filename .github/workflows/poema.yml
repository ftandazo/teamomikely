name: Poema diario

on:
  workflow_dispatch:

jobs:
  generar-poema:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node generar_poema.js
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
