name: Poema Diario

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generar poema
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generar_poema.js

      - name: Guardar cambios
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add poema.json
          git commit -m "Poema diario" || echo "Sin cambios"
          git push
